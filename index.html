<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리더십교육부 주요 교육 일정 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.15);
    --text: #1a1918; --text2: #6b6a66; --text3: #a09f9b;
    --accent: #3C3489; --accent-light: #eeedfe; --radius: 10px;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--accent); padding: 28px 40px 24px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  header p { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; font-weight: 300; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .view-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .view-btn:hover { background: rgba(255,255,255,0.25); }
  .view-btn.active { background: #fff; color: var(--accent); font-weight: 500; }
  main { padding: 28px 40px 60px; max-width: 1400px; margin: 0 auto; }
  .month-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .m-tab { padding: 8px 22px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .m-tab:hover { border-color: var(--accent); color: var(--accent); }
  .m-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
  .lg-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text2); }
  .lg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); border: 1px solid var(--border2); border-radius: var(--radius); overflow: hidden; background: var(--border); gap: 1px; }
  .day-hdr { background: var(--surface2); padding: 9px 0; text-align: center; font-size: 12px; font-weight: 500; color: var(--text2); }
  .day-hdr.sun { color: #A32D2D; }
  .day-hdr.sat { color: #185FA5; }
  .day-cell { background: var(--surface); padding: 6px; min-height: 150px; }
  .day-cell.dim { background: #faf9f5; }
  .day-cell.dim .day-num { color: var(--text3) !important; }
  .day-num { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 3px; line-height: 1.4; }
  .day-num.sun { color: #A32D2D; }
  .day-num.sat { color: #185FA5; }
  .ev { font-size: 10px; line-height: 1.5; border-radius: 3px; padding: 2px 5px; margin-bottom: 2px; word-break: keep-all; cursor: default; }
  .ev.continuing { border-left: 3px solid rgba(0,0,0,0.15); border-radius: 0 3px 3px 0; }
  .grade-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 0 3px; border-radius: 2px; margin-right: 2px; vertical-align: middle; }
  #listView { display: none; }
  .list-month-title { font-size: 16px; font-weight: 700; color: var(--accent); margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-light); }
  .list-month-title:first-child { margin-top: 0; }
  .list-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; font-size: 13px; }
  .list-table th { background: var(--surface2); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border); }
  .list-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr:hover td { background: #faf9f6; }
  .cat-pill { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .date-range { color: var(--text2); font-size: 12px; white-space: nowrap; }
  @media (max-width: 768px) {
    header { padding: 20px 20px 16px; }
    main { padding: 20px 16px 40px; }
    .day-cell { min-height: 100px; padding: 3px; }
    .ev { font-size: 9px; padding: 1px 3px; }
  }
  @media print { header, .ev { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>
<body>
<header>
  <div>
    <h1>리더십교육부 주요 교육 일정</h1>
    <p>2026년 3월 — 6월</p>
  </div>
  <div class="header-right">
    <button class="view-btn active" onclick="setView('cal')">캘린더</button>
    <button class="view-btn" onclick="setView('list')">목록</button>
  </div>
</header>
<main>
  <div class="month-tabs" id="tabs">
    <button class="m-tab active" onclick="setMonth(3)">3월</button>
    <button class="m-tab" onclick="setMonth(4)">4월</button>
    <button class="m-tab" onclick="setMonth(5)">5월</button>
    <button class="m-tab" onclick="setMonth(6)">6월</button>
  </div>
  <div class="legend">
    <div class="lg-item"><div class="lg-dot" style="background:#534AB7"></div>6급 교육</div>
    <div class="lg-item"><div class="lg-dot" style="background:#D4537E"></div>9급 교육</div>
    <div class="lg-item"><div class="lg-dot" style="background:#5F5E5A"></div>6·9급 혼합</div>
    <div class="lg-item"><div class="lg-dot" style="background:#0F6E56"></div>OJT / 해외파견</div>
    <div class="lg-item"><div class="lg-dot" style="background:#993C1D"></div>KGC 교육</div>
    <div class="lg-item"><div class="lg-dot" style="background:#185FA5"></div>KT&G 교육</div>
    <div class="lg-item"><div class="lg-dot" style="background:#854F0B"></div>보고 / 평가</div>
    <div class="lg-item"><div class="lg-dot" style="background:#3B6D11"></div>아카데미 / 기타</div>
  </div>
  <div id="calView"><div class="cal-grid" id="grid"></div></div>
  <div id="listView"><div id="listContent"></div></div>
</main>
<script>
const EVENTS = [
  { title:"6급 신입사원 순환 OJT", start:"2026-03-03", end:"2026-04-02", cat:"new6" },
  { title:"9급 영업 신입사원 입문교육(I)", start:"2026-03-16", end:"2026-04-10", cat:"new9" },
  { title:"KGC 하이퍼포머 교육(DC/경영시뮬레이션)", start:"2026-03-18", end:"2026-03-19", cat:"kgc" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-03-23", end:"2026-03-23", cat:"kgc" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-03-24", end:"2026-03-24", cat:"kgc" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-03-26", end:"2026-03-26", cat:"kgc" },
  { title:"KT&G 신임관리자 경영실무 테스트", start:"2026-03-27", end:"2026-03-27", cat:"ktg" },
  { title:"6급 신입(인턴) 결과보고", start:"2026-03-31", end:"2026-03-31", cat:"report" },
  { title:"6급 수습사원 해외OJT", start:"2026-04-06", end:"2026-04-30", cat:"ojt" },
  { title:"KGC 퇴직예정자 법정의무교육", start:"2026-04-08", end:"2026-04-10", cat:"kgc" },
  { title:"KT&G 경력입문교육", start:"2026-04-13", end:"2026-04-14", cat:"ktg" },
  { title:"아카데미 E코스", start:"2026-04-13", end:"2026-05-10", cat:"academy" },
  { title:"9급 영업 신입사원 현장 OJT", start:"2026-04-13", end:"2026-05-29", cat:"ojt" },
  { title:"도제사원 수습 OJT 결과보고", start:"2026-04-16", end:"2026-04-16", cat:"report" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-04-20", end:"2026-04-20", cat:"kgc" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-04-21", end:"2026-04-21", cat:"kgc" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-04-22", end:"2026-04-22", cat:"kgc" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-04-24", end:"2026-04-24", cat:"kgc" },
  { title:"9급 수습OJT 결과보고", start:"2026-04-23", end:"2026-04-23", cat:"report" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-04-27", end:"2026-04-27", cat:"kgc" },
  { title:"9급 수습사원 정규임용식", start:"2026-04-28", end:"2026-04-28", cat:"report" },
  { title:"KGC 관리자 리모트 리더십 교육", start:"2026-04-28", end:"2026-04-28", cat:"kgc" },
  { title:"KT&G 신임관리자 MBA 워크숍", start:"2026-04-29", end:"2026-04-30", cat:"ktg" },
  { title:"KT&G그룹 신임임원 세미나", start:"2026-04-30", end:"2026-04-30", cat:"ktg" },
  { title:"수습사원 해외교육 파견·모니터링", start:"2026-05-04", end:"2026-06-30", cat:"ojt" },
  { title:"아카데미 E코스 테스트", start:"2026-05-11", end:"2026-05-12", cat:"academy" },
  { title:"신임관리자 리더십 1:1 DC·피드백", start:"2026-05-11", end:"2026-05-29", cat:"ktg" },
  { title:"아카데미 E코스 결과보고", start:"2026-05-14", end:"2026-05-14", cat:"report" },
  { title:"본사 4급 사업의 이해", start:"2026-05-28", end:"2026-05-29", cat:"academy" },
  { title:"아카데미 A코스", start:"2026-06-01", end:"2026-06-30", cat:"academy" },
  { title:"9급 영업 신입사원 입문교육(II)", start:"2026-06-01", end:"2026-06-05", cat:"new9" },
  { title:"9급 영업 신입(인턴) 결과보고", start:"2026-06-02", end:"2026-06-02", cat:"report" },
  { title:"본사 4급 사업의 이해", start:"2026-06-04", end:"2026-06-05", cat:"academy" },
  { title:"6급(R&D)·9급(제조) 신입사원 입문교육", start:"2026-06-15", end:"2026-06-30", cat:"mixed" },
];
const COLORS = {
  new6:   { bg:"#AFA9EC", text:"#26215C", badge:"6급", badgeBg:"#534AB7", badgeText:"#EEEDFE", pill:"#534AB7", pillText:"#fff", label:"6급 교육" },
  new9:   { bg:"#ED93B1", text:"#4B1528", badge:"9급", badgeBg:"#993556", badgeText:"#FBEAF0", pill:"#993556", pillText:"#fff", label:"9급 교육" },
  mixed:  { bg:"#D3D1C7", text:"#2C2C2A", badge:"6·9급", badgeBg:"#5F5E5A", badgeText:"#F1EFE8", pill:"#5F5E5A", pillText:"#fff", label:"6·9급 혼합" },
  ojt:    { bg:"#5DCAA5", text:"#04342C", badge:null, pill:"#0F6E56", pillText:"#fff", label:"OJT/파견" },
  kgc:    { bg:"#F0997B", text:"#4A1B0C", badge:null, pill:"#993C1D", pillText:"#fff", label:"KGC 교육" },
  ktg:    { bg:"#85B7EB", text:"#042C53", badge:null, pill:"#185FA5", pillText:"#fff", label:"KT&G 교육" },
  report: { bg:"#FAC775", text:"#412402", badge:null, pill:"#854F0B", pillText:"#fff", label:"보고/평가" },
  academy:{ bg:"#97C459", text:"#173404", badge:null, pill:"#3B6D11", pillText:"#fff", label:"아카데미/기타" },
};
const MONTH_NAMES = {3:"3월",4:"4월",5:"5월",6:"6월"};
function ds(s){ const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function fd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function fmtDate(s){ return s.slice(5).replace("-","."); }
let curM=3, curView="cal";
function setMonth(m){ curM=m; document.querySelectorAll(".m-tab").forEach((t,i)=>t.classList.toggle("active",i===m-3)); render(); }
function setView(v){
  curView=v;
  document.querySelectorAll(".view-btn").forEach(b=>b.classList.toggle("active",b.textContent===(v==="cal"?"캘린더":"목록")));
  document.getElementById("calView").style.display=v==="cal"?"block":"none";
  document.getElementById("listView").style.display=v==="list"?"block":"none";
  document.querySelectorAll(".month-tabs").forEach(el=>el.style.display=v==="cal"?"flex":"none");
  render();
}
function makeBar(ev, isStart){
  const c=COLORS[ev.cat];
  const bar=document.createElement("div");
  bar.className="ev"+(isStart?"":" continuing");
  bar.style.background=c.bg; bar.style.color=c.text;
  bar.title=ev.title+(ev.start!==ev.end?` (${fmtDate(ev.start)} ~ ${fmtDate(ev.end)})`:"");
  if(c.badge){
    const badge=document.createElement("span");
    badge.className="grade-badge";
    badge.style.background=c.badgeBg; badge.style.color=c.badgeText;
    badge.textContent=c.badge; bar.appendChild(badge);
  }
  const label = isStart
    ? ev.title + (ev.start!==ev.end ? ` (~${fmtDate(ev.end)})` : "")
    : ev.title;
  bar.appendChild(document.createTextNode(label));
  return bar;
}
function renderCal(){
  const grid=document.getElementById("grid"); grid.innerHTML="";
  ["일","월","화","수","목","금","토"].forEach((d,i)=>{
    const h=document.createElement("div");
    h.className="day-hdr"+(i===0?" sun":i===6?" sat":"");
    h.textContent=d; grid.appendChild(h);
  });
  const first=new Date(2026,curM-1,1), last=new Date(2026,curM,0);
  const startDow=first.getDay(), total=Math.ceil((startDow+last.getDate())/7)*7;
  for(let i=0;i<total;i++){
    const date=new Date(2026,curM-1,i-startDow+1);
    const dateStr=fd(date), inMonth=date.getMonth()===curM-1, dow=date.getDay();
    const cell=document.createElement("div");
    cell.className="day-cell"+(!inMonth?" dim":"");
    const num=document.createElement("div");
    num.className="day-num"+(dow===0?" sun":dow===6?" sat":"");
    num.textContent=date.getDate(); cell.appendChild(num);
    if(inMonth){
      EVENTS.filter(e=>e.start===dateStr).forEach(ev=>cell.appendChild(makeBar(ev,true)));
      EVENTS.filter(e=>e.start!==dateStr&&ds(e.start)<=date&&ds(e.end)>=date).forEach(ev=>cell.appendChild(makeBar(ev,false)));
    }
    grid.appendChild(cell);
  }
}
function renderList(){
  const content=document.getElementById("listContent"); content.innerHTML="";
  [3,4,5,6].forEach(m=>{
    const mStart=new Date(2026,m-1,1), mEnd=new Date(2026,m,0);
    const evs=EVENTS.filter(e=>ds(e.start)<=mEnd&&ds(e.end)>=mStart).sort((a,b)=>a.start.localeCompare(b.start));
    if(!evs.length) return;
    const title=document.createElement("div"); title.className="list-month-title"; title.textContent="2026년 "+MONTH_NAMES[m]; content.appendChild(title);
    const tbl=document.createElement("table"); tbl.className="list-table";
    tbl.innerHTML=`<thead><tr><th style="width:150px">기간</th><th>교육명</th><th style="width:110px">구분</th></tr></thead>`;
    const tbody=document.createElement("tbody");
    evs.forEach(ev=>{
      const c=COLORS[ev.cat]; const tr=document.createElement("tr");
      const dateStr=ev.start===ev.end?fmtDate(ev.start):`${fmtDate(ev.start)} ~ ${fmtDate(ev.end)}`;
      tr.innerHTML=`<td class="date-range">${dateStr}</td><td>${ev.title}</td><td><span class="cat-pill" style="background:${c.pill};color:${c.pillText}">${c.label}</span></td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody); content.appendChild(tbl);
  });
}
function render(){ if(curView==="cal") renderCal(); else renderList(); }
render();
</script>
</body>
</html>
